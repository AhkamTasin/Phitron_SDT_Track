    ***CSS position: static:

    All HTML elements are positioned static by default.
    Static positioned elements are not affected by the top, bottom, left, and right properties.
    An element with position: static; is always positioned according to the normal flow of the page:
    
    position: static; হলো CSS এর default position।
    মানে কোনো element এ position না দিলেও সেটা automatically static থাকে।
    এ অবস্থায়:
    * element normal document flow অনুযায়ী থাকবে
    * top, left, right, bottom কাজ করবে না
    * element নিজের স্বাভাবিক জায়গাতেই থাকবে



    
    ***CSS position: fixed:

    mane jodi amra kono box ke fixed position dei seta floting obostay thakbe and tar nij jaygay fixed hoye zabe, 
    mane scroll korle o seta sobsomoy tar fixed position e thakbe.

    position: fixed; দিলে element টি document flow থেকে বের হয়ে viewport এর নির্দিষ্ট জায়গায় fixed হয়ে থাকে। 
    তাই page scroll করলেও element টি একই জায়গায় দেখা যায়।
    
    Fixed navbar, Chat button etc. er jonno fixed position use kora hoy. karon amra chai, page scroll korleo egula zeno sobsomoy ekta fixed position e show kore.


    position: fixed দিলে element টি normal document flow থেকে বের হয়ে যায়। তাই:

    অন্য element গুলো মনে করে ওই box টা সেখানে নেই 
    ফলে তারা তার জায়গা “দখল” করে নেয়
    আর fixed element টি উপরে ভাসতে থাকে (overlay/overlap করে)

    তাই fixed element অনেক সময় অন্য element এর উপর overlap করে দেখা যায়।

    আর এজন্যই navbar fixed করলে নিচের content অনেক সময় navbar এর নিচে ঢুকে যায় 😄
