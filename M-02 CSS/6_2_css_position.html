<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position: Relative</title>
    <link rel="stylesheet" href="6_2_css_position.css">
</head>
<body>
    
    <div class="box1 all_box">
        This is a box 1
    </div>

    <div class="box2 all_box">
        This is a box 2
    </div>

    <div class="box3 all_box">
        This is a box 3
    </div>


    <!-- 
    position: relative; দিলে element টি document flow থেকে বের হয় না।
    মানে তার জন্য আগের জায়গা reserve থাকেই। 
    কিন্তু এরপর তুমি top, left, right, bottom ব্যবহার করে element টাকে তার original position থেকে সরাতে পারো।

    তার পুরানো জায়গাটা খালি থেকেই reserve থাকবে।
    অন্য element এসে সেই জায়গা দখল করবে না।
    
    এখন আমি top, left, right, bottom দিয়ে element/box টাকে তার পুরানো জায়গাটার boundary এর সাপেক্ষে সরাতে পারি।
    
    fixed → flow থেকে বের হয়ে floating/overlay করে
    relative → flow(document flow) এর মধ্যেই থাকে, শুধু visually সরে যায়

    mane onno box gula tar obostan oi ager position ei (document flow tei)  ase mone korbe. shudu visually amra ta soriye dite parbo top, left, right, bottom diye. 


    
    -->




</body>
</html>
